name: 株価データ自動更新

# 再発防止 Phase 1（docs/recurrence-prevention.md v2 / docs/phase1-implementation-notes.md）
# ジョブ構成:
#   test  (N3)  : validatorゴールデンテスト。番人の番人。失敗したら update は走らない
#   smoke (L6a) : 実fetchで環境固有バグを書込み前に検知。失敗したら update は走らない
#   update      : 生成→検証(L1/L2/N4)→合格時のみアトミック書込→commit/push
#   warn-notify : 検証warn時にIssueへ集約通知（オープン中のdata-warn Issueに追記）
#   notify (N2) : いずれかのジョブ失敗時にIssue起票＋assigneeで通知タブ/モバイルに届ける

on:
  schedule:
    # 毎週月〜金の 07:30 UTC = 日本時間 16:30(東証の閉場後)に実行。
    # ※祝日は認識しない(祝日も実行される)。この前提はアプリ側の鮮度バナー閾値
    #   (kFreshnessWarnHours=96h)の安全マージンに使われている。祝日スキップを
    #   導入する場合はアプリ側の閾値も併せて見直すこと。
    # ※L1のfailが連続してcommitが止まり続けると、60日無活動でGitHubがscheduled
    #   triggerを自動無効化する仕様と複合し得る(発生時はrun自体が止まる)。
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      drill:
        description: "通知経路ドリル: testジョブを意図的に失敗させ、Issue起票まで発火させる(データには一切触れない)"
        type: boolean
        default: false

# 既定は読み取りのみ。書込権限は必要なジョブにだけ個別付与する(最小権限)。
# 特に smoke/update は yfinance(サードパーティ依存)を実行するジョブなので、
# 不要な issues:write を持たせない(依存が汚染された場合の被害範囲を絞る)。
permissions:
  contents: read

env:
  # L5: 依存固定。1.5.1 = 2026-06-28リリース、07-09〜07-14の成功runで実績のある版
  # (バージョン未固定時代のrunはPyPIリリース時系列から1.5.1で解決されていたと導出済み)
  YFINANCE_VERSION: "1.5.1"

jobs:
  test:
    # N3: validate_stocks.py のゴールデンテスト(stdlibのみ・yfinance不要)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Pythonをセットアップ
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: 通知経路ドリル(意図的失敗)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.drill }}
        run: |
          echo "::error::【ドリル】通知経路の訓練のため意図的に失敗させています(データ異常ではありません)"
          exit 1
      - name: ゴールデンテスト(全滅=FAIL/正常=PASS/境界89-91%)
        run: python -m unittest discover -s tests -t . -v

  smoke:
    # L6a: 実fetchスモーク。生成本体とは独立に環境バグを検知し、書込み前に止める
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Pythonをセットアップ
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: 必要なライブラリをインストール
        run: pip install "yfinance==${YFINANCE_VERSION}"
      - name: canary実fetch(失敗時は60秒後に1回リトライ)
        run: |
          python smoke_test.py || { echo "1回目失敗。60秒後にリトライします"; sleep 60; python smoke_test.py; }

  update:
    needs: [test, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 更新したJSONをリポジトリに保存する
    outputs:
      level: ${{ steps.report.outputs.level }}
      report: ${{ steps.report.outputs.report }}
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Pythonをセットアップ
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: 必要なライブラリをインストール
        run: pip install "yfinance==${YFINANCE_VERSION}"
      - name: 株価データを更新(生成→検証→合格時のみ書込)
        run: python update_stocks.py
      - name: 検証レポートをjob outputとサマリに載せる
        if: always()
        id: report
        run: |
          if [ -f validation_report.json ]; then
            echo "level=$(python -c 'import json; print(json.load(open("validation_report.json"))["level"])')" >> "$GITHUB_OUTPUT"
            # heredocデリミタは毎回ランダム化する。レポート本文にデリミタと同一の
            # 行が現れると GITHUB_OUTPUT を汚染できてしまうため(環境ファイル
            # インジェクション対策・GitHub公式の推奨)。
            DELIM="EOF_$(openssl rand -hex 8)"
            {
              echo "report<<${DELIM}"
              cat validation_report.md
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
            cat validation_report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "検証レポートが生成されていません(生成段階で異常終了)" >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: 更新結果を保存(コミット)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks.json market.json history.json
          git diff --cached --quiet || git commit -m "自動更新: 株価データ $(date +'%Y-%m-%d')"
          git push

  warn-notify:
    # 検証warn(配信はしたが要注意)の集約通知。オープン中のdata-warn Issueがあれば
    # 追記、なければ新規作成(毎回新規Issueを立てるとオオカミ少年化するため)
    needs: [update]
    if: ${{ needs.update.result == 'success' && needs.update.outputs.level == 'warn' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write  # Issueの起票・追記のみ(contents権限は不要)
    env:
      GH_TOKEN: ${{ github.token }}
      REPORT: ${{ needs.update.outputs.report }}
    steps:
      - name: warn Issueへ集約通知
        run: |
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BODY=$(printf '%s\n\n%s\n\nRun: %s' "$(date -u -d '+9 hours' +'%Y-%m-%d %H:%M JST') の更新は warn 付きで配信されました。" "$REPORT" "$RUN_URL")
          gh label create data-warn --repo "$REPO" --color FBCA04 --description "データ検証warnの集約通知" --force
          EXISTING=$(gh issue list --repo "$REPO" --label data-warn --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" --body "$BODY"
          else
            gh issue create --repo "$REPO" --title "🟡 データ検証warn(集約)" --body "$BODY" --label data-warn --assignee ryuureon-coder
          fi

  notify:
    # N2: 歯のある失敗通知。どのジョブ・どのゲートが・何%で落ちたかを本文に含める。
    # assignee設定によりGitHubの通知タブ・モバイル通知に確実に乗せる(Watch設定に依存しない)
    needs: [test, smoke, update]
    if: ${{ always() && (needs.test.result == 'failure' || needs.smoke.result == 'failure' || needs.update.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write  # Issueの起票のみ(contents権限は不要)
    env:
      GH_TOKEN: ${{ github.token }}
      REPORT: ${{ needs.update.outputs.report }}
    steps:
      - name: 失敗Issueを起票
        run: |
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NOW_JST=$(date -u -d '+9 hours' +'%Y-%m-%d %H:%M')
          DRILL_NOTE=""
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.drill }}" = "true" ]; then
            DRILL_NOTE="【ドリル】これは通知経路の訓練です。データ異常ではありません。この通知が読めていれば経路は健全です。"
          fi
          BODY=$(printf '%s\n\n| ジョブ | 結果 |\n|---|---|\n| test (golden) | %s |\n| smoke (L6a) | %s |\n| update (L1/L2/N4) | %s |\n\n%s\n\nRun: %s' \
            "$DRILL_NOTE" \
            "${{ needs.test.result }}" \
            "${{ needs.smoke.result }}" \
            "${{ needs.update.result }}" \
            "${REPORT:-（検証レポートなし: test/smoke段階での失敗、または生成が検証前に異常終了。詳細はRunログ参照）}" \
            "$RUN_URL")
          gh label create data-fail --repo "$REPO" --color B60205 --description "データ更新の失敗通知" --force
          gh issue create --repo "$REPO" \
            --title "🔴 データ更新失敗: ${NOW_JST} JST" \
            --body "$BODY" \
            --label data-fail \
            --assignee ryuureon-coder
