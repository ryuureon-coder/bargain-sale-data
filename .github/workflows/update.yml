name: 株価データ自動更新

on:
  schedule:
    # 毎週月〜金の 07:30 UTC = 日本時間 16:30(東証の閉場後)に実行
    - cron: "30 7 * * 1-5"
  workflow_dispatch: {}  # 手動実行ボタンも有効にする(テスト用)

permissions:
  contents: write  # 更新したJSONをリポジトリに保存するための権限

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 必要なライブラリをインストール
        run: pip install yfinance

      - name: 株価データを更新
        run: python update_stocks.py

      - name: 更新結果を保存(コミット)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stocks.json market.json history.json
          git diff --cached --quiet || git commit -m "自動更新: 株価データ $(date +'%Y-%m-%d')"
          git push
